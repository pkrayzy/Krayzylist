name: Notify FiltersCompiler on Blocklist change

on:
  push:
    paths:
      - 'Blocklist'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger FiltersCompiler Quick Fixes
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/pkrayzy/FiltersCompiler/dispatches \
            -d '{"event_type":"trigger-quickfixes"}'